{% extends "notes/base.html" %}
{% block content %}
<h2>{{ action }} Note</h2>
<form method="post">
    {% csrf_token %}
    <label>Title</label>
    <input type="text" name="title" value="{{ note.title }}" required>
    <label>Content</label>
    <textarea name="content">{{ note.content }}</textarea>
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="/" class="btn">Cancel</a>
</form>
{% endblock %}
