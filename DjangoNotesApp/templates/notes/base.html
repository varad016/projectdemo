<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Notes App</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        a { color: #333; }
        .btn { padding: 6px 14px; text-decoration: none; border: 1px solid #ccc; border-radius: 4px; }
        .btn-primary { background: #333; color: white; border-color: #333; }
        .btn-danger { background: #c00; color: white; border-color: #c00; }
        input, textarea { width: 100%; padding: 8px; margin: 6px 0 14px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        textarea { height: 150px; }
    </style>
</head>
<body>
    <h1><a href="/" style="text-decoration:none;">Notes</a></h1>
    {% block content %}{% endblock %}
</body>
</html>
